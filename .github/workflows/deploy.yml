name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Container Instances
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy containerapp
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: soundbridge-rg
          template: ./azure/deploy.bicep
          parameters: >
            containerImage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            supabaseDbUrl=${{ secrets.SUPABASE_DB_URL }}
            supabaseDbUser=${{ secrets.SUPABASE_DB_USER }}
            supabaseDbPassword=${{ secrets.SUPABASE_DB_PASSWORD }}
            spotifyClientId=${{ secrets.SPOTIFY_CLIENT_ID }}
            spotifyClientSecret=${{ secrets.SPOTIFY_CLIENT_SECRET }}
            youtubeApiKey=${{ secrets.YOUTUBE_API_KEY }}
