server.port=${SERVER_PORT:9000}

spring.datasource.url=${SPRING_DATASOURCE_URL:${SUPABASE_DB_URL:jdbc:h2:mem:soundbridge;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${SUPABASE_DB_USER:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${SUPABASE_DB_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

spotify.client-id=${SPOTIFY_CLIENT_ID:}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
spotify.api-base-url=${SPOTIFY_API_BASE_URL:https://api.spotify.com/v1}
spotify.accounts-base-url=${SPOTIFY_ACCOUNTS_BASE_URL:https://accounts.spotify.com}
spotify.safe-fallback.enabled=${SPOTIFY_SAFE_FALLBACK_ENABLED:false}

youtube.api-key=${YOUTUBE_API_KEY:}
youtube.api-base-url=${YOUTUBE_API_BASE_URL:https://www.googleapis.com/youtube/v3}
youtube.search.max-results=${YOUTUBE_SEARCH_MAX_RESULTS:5}
youtube.match.threshold=${YOUTUBE_MATCH_THRESHOLD:0.45}
youtube.retry.match.threshold=${YOUTUBE_RETRY_MATCH_THRESHOLD:0.40}
youtube.match.strict.threshold=${YOUTUBE_MATCH_STRICT_THRESHOLD:0.72}
youtube.match.title.weight=${YOUTUBE_MATCH_TITLE_WEIGHT:0.62}
youtube.match.artist.weight=${YOUTUBE_MATCH_ARTIST_WEIGHT:0.38}
youtube.match.indicator.mismatch.penalty=${YOUTUBE_MATCH_INDICATOR_MISMATCH_PENALTY:0.18}
youtube.match.indicator.match.bonus=${YOUTUBE_MATCH_INDICATOR_MATCH_BONUS:0.04}
youtube.match.artist.title.cross-weight=${YOUTUBE_MATCH_ARTIST_TITLE_CROSS_WEIGHT:0.55}

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.token-url=${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}

api.retry.max-attempts=${API_RETRY_MAX_ATTEMPTS:3}
api.retry.initial-backoff-ms=${API_RETRY_INITIAL_BACKOFF_MS:250}

management.endpoints.web.exposure.include=health,info

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,https://localhost:5173,https://localhost:5174,https://localhost:5175,https://127.0.0.1:5173,https://127.0.0.1:5174,https://127.0.0.1:5175}
